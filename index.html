<!DOCTYPE html>
<html>
<head>
    <title>Flowboard</title>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script>
        // Simulated IndexedDB for persistence
        let db;
        const request = indexedDB.open("flowboard", 1);

        request.onupgradeneeded = function(event) {
            db = event.target.result;
            db.createObjectStore('tasks', { keyPath: 'id' });
        };

        request.onsuccess = function(event) {
            db = event.target.result;
            loadTasks();
        };

        function saveTask(task) {
            const transaction = db.transaction(['tasks'], 'readwrite');
            const store = transaction.objectStore('tasks');
            store.put(task);
        }

        function loadTasks() {
            const transaction = db.transaction(['tasks'], 'readonly');
            const store = transaction.objectStore('tasks');
            store.getAll().onsuccess = function(event) {
                const tasks = event.target.result;
                renderTasks(tasks);
            };
        }

        function renderTasks(tasks) {
            $('#tasks').empty();
            tasks.forEach(task => {
                $('#tasks').append(`<div>${task.name} <button onclick="toggleComplete(${task.id})">${task.completed ? 'Concluído' : 'Pendente'}</button></div>`);
                if (task.subtasks && task.subtasks.length) {
                    task.subtasks.forEach(subtask => {
                        $('#tasks').append(`<div style='margin-left:20px;'>- ${subtask.name} <button onclick="toggleSubtaskComplete(${task.id}, '${subtask.name}')">${subtask.completed ? 'Concluído' : 'Pendente'}</button></div>`);
                    });
                }
            });
        }

        function toggleComplete(taskId) {
            const transaction = db.transaction(['tasks'], 'readwrite');
            const store = transaction.objectStore('tasks');
            store.get(taskId).onsuccess = function(event) {
                const task = event.target.result;
                task.completed = !task.completed;
                saveTask(task);
            };
        }

        function toggleSubtaskComplete(taskId, subtaskName) {
            const transaction = db.transaction(['tasks'], 'readwrite');
            const store = transaction.objectStore('tasks');
            store.get(taskId).onsuccess = function(event) {
                const task = event.target.result;
                const subtask = task.subtasks.find(st => st.name === subtaskName);
                subtask.completed = !subtask.completed;
                saveTask(task);
            };
        }

        $(document).ready(function() {
            $('#addTaskButton').click(function() {
                const taskName = $('#taskInput').val();
                const subtasks = []; // Extract subtasks from input, if any
                const newTask = { id: Date.now(), name: taskName, completed: false, subtasks: subtasks };
                saveTask(newTask);
                $('#taskInput').val('');
            });
        });
    </script>
</head>
<body>
    <h1>Flowboard</h1>
    <input type="text" id="taskInput" placeholder="Add new task">
    <button id="addTaskButton">Add Task</button>
    <div id="tasks"></div>
</body>
</html>
