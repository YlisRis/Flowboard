<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0D0F1A"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="flow.board"/>
<title>flow.board</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"/>
<style>
:root{--bg:#0D0F1A;--surface:#13152A;--border:rgba(255,255,255,0.08);--text:#E8E8F0;--muted:#9999BB;--accent:#7C8CF8;--green:#4ECDC4;--yellow:#FFAB2E;--red:#FF5C5C}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100dvh}
.views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;padding:18px 14px 24px;display:none}
.view.active{display:block}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:rgba(13,15,26,0.92);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);flex-shrink:0;z-index:50;gap:10px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.logo em{-webkit-text-fill-color:var(--yellow);font-style:normal}
.header-btns{display:flex;gap:8px;align-items:center}
.btn-add{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--accent),#5B6EF5);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;box-shadow:0 4px 14px rgba(124,140,248,0.4);-webkit-tap-highlight-color:transparent;white-space:nowrap}
.btn-menu{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.btn-back{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent}

/* subtask header */
.sub-header-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px}

/* ── Nav ── */
nav{display:flex;border-top:1px solid var(--border);background:rgba(13,15,26,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:color 0.2s;-webkit-tap-highlight-color:transparent}
.nav-btn .icon{font-size:20px;line-height:1}
.nav-btn.active{color:var(--accent)}

/* ── Kanban ── */
.kanban-wrap{display:flex;gap:14px;min-width:max-content;padding-bottom:4px}
#view-kanban,#view-subtasks,#view-allsubs{overflow-x:auto}
.col{width:260px;flex-shrink:0;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:18px;display:flex;flex-direction:column;overflow:hidden}
.col-header{display:flex;align-items:center;gap:8px;padding:14px 16px 10px}
.col-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.col-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.col-count{margin-left:auto;font-size:12px;color:var(--muted);background:rgba(255,255,255,0.07);padding:1px 9px;border-radius:20px}
.col-body{padding:0 10px 14px;display:flex;flex-direction:column;gap:8px;flex:1}
.col-empty{text-align:center;padding:20px;color:#555577;font-size:12px}

/* ── Card ── */
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:13px;padding:12px 13px;position:relative;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color 0.15s}
.card:active{opacity:0.8}
.card:hover{border-color:rgba(255,255,255,0.14)}
.card-accent{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.card-title{font-family:'Syne',sans-serif;font-weight:600;font-size:13px;margin-bottom:5px;line-height:1.4}
.card-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:8px}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:3px}
.date-chip{font-size:10px;color:var(--muted);margin-left:auto}
.card-actions{display:flex;gap:5px;margin-top:9px;padding-top:9px;border-top:1px solid rgba(255,255,255,0.06)}
.action-btn{flex:1;padding:5px 4px;border-radius:7px;border:none;cursor:pointer;font-size:10px;font-weight:500;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.btn-move{background:rgba(255,255,255,0.05);color:var(--muted)}
.btn-edit{background:rgba(78,205,196,0.1);color:var(--green)}
.btn-del{background:rgba(255,92,92,0.1);color:var(--red)}
.btn-subtasks{background:rgba(124,140,248,0.1);color:var(--accent)}

/* ── Subtask progress bar ── */
.subtask-progress{margin-top:8px;margin-bottom:2px}
.subtask-progress-bar-bg{height:3px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden}
.subtask-progress-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width 0.3s}
.subtask-progress-label{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px}
.subtask-chip{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--accent);background:rgba(124,140,248,0.1);padding:2px 8px;border-radius:20px;font-weight:600;cursor:pointer}

/* ── Subtasks view banner ── */
.subtasks-banner{background:rgba(124,140,248,0.07);border:1px solid rgba(124,140,248,0.2);border-radius:14px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.subtasks-banner-icon{font-size:22px}
.subtasks-banner-info{}
.subtasks-banner-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--text)}
.subtasks-banner-desc{font-size:11px;color:var(--muted);margin-top:2px}

/* ── Sub-card (subtask card) ── */
.sub-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:11px;padding:10px 12px;position:relative;overflow:hidden}
.sub-card-accent{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.sub-card-title{font-family:'Syne',sans-serif;font-weight:600;font-size:12px;line-height:1.4;margin-bottom:5px}
.sub-card-meta{display:flex;align-items:center;gap:5px}
.sub-card-actions{display:flex;gap:4px;margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,255,255,0.06)}

/* ── Parent task chip (allsubs view) ── */
.parent-chip{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--yellow);background:rgba(255,171,46,0.1);padding:2px 8px;border-radius:20px;font-weight:600;cursor:pointer;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Calendar ── */
.cal-nav-row{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.cal-month-label{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;flex:1}
.cal-arrow{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.04);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-lbl{text-align:center;font-size:11px;font-weight:600;color:#5555AA;padding-bottom:6px;font-family:'Syne',sans-serif}
.cal-cell{min-height:68px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:5px;display:flex;flex-direction:column;gap:3px}
.cal-cell.today{border-color:var(--accent);background:rgba(124,140,248,0.07)}
.cal-cell.empty{background:transparent;border-color:transparent}
.cal-num{font-size:12px;font-weight:600;font-family:'Syne',sans-serif}
.cal-cell.today .cal-num{color:var(--accent)}
.cal-chip{font-size:9px;font-weight:600;padding:2px 5px;border-radius:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.4}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:999;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-top:1px solid rgba(255,255,255,0.12);border-radius:24px 24px 0 0;padding:22px 18px 32px;width:100%;max-height:92dvh;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s cubic-bezier(.32,.72,0,1)}
.overlay.open .modal{transform:translateY(0)}
.modal-handle{width:38px;height:4px;background:rgba(255,255,255,0.15);border-radius:4px;margin:0 auto 18px}
.modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;margin-bottom:18px}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:0.5px;text-transform:uppercase}
.field input,.field textarea,.field select{width:100%;padding:11px 13px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.15s;appearance:none;-webkit-appearance:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:68px}
.field select option{background:#13152A}
.field input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.6);cursor:pointer}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.priority-group{display:flex;gap:7px}
.prio-opt{flex:1;padding:8px 4px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:transparent;cursor:pointer;text-align:center;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;color:var(--muted);-webkit-tap-highlight-color:transparent}
.modal-footer{display:flex;gap:8px;margin-top:18px}
.btn-cancel{flex:1;padding:13px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500}
.btn-save{flex:2;padding:13px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--accent),#5B6EF5);color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;box-shadow:0 4px 16px rgba(124,140,248,0.35)}
.btn-del-task{padding:13px 14px;border-radius:11px;border:none;background:rgba(255,92,92,0.12);color:var(--red);cursor:pointer;font-size:16px}

/* ── Drawer ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:998;opacity:0;pointer-events:none;transition:opacity 0.25s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;right:0;bottom:0;width:260px;background:var(--surface);border-left:1px solid rgba(255,255,255,0.1);z-index:999;transform:translateX(100%);transition:transform 0.3s cubic-bezier(.32,.72,0,1);padding:60px 20px 40px;display:flex;flex-direction:column;gap:10px}
.drawer.open{transform:translateX(0)}
.drawer-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;margin-bottom:8px;color:var(--muted)}
.drawer-btn{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:13px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;text-align:left;-webkit-tap-highlight-color:transparent}
.drawer-btn .di{font-size:20px;width:28px;text-align:center}
.drawer-sep{height:1px;background:var(--border);margin:4px 0}
.drawer-note{font-size:11px;color:var(--muted);line-height:1.6;padding:8px 4px}

/* ── Toast ── */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,33,55,0.97);border:1px solid var(--border);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:500;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:9999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Loading ── */
.loading{display:flex;align-items:center;justify-content:center;height:80%;flex-direction:column;gap:12px;color:var(--muted);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid rgba(124,140,248,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
</style>
</head>
<body>
<div class="app">
  <!-- ── Header (main) ── -->
  <header id="header-main">
    <div class="logo">flow<em>.</em>board</div>
    <div class="header-btns">
      <button class="btn-add" onclick="openModal()">＋ Tarefa</button>
      <button class="btn-menu" onclick="openDrawer()">☰</button>
    </div>
  </header>

  <!-- ── Header (subtasks) ── -->
  <header id="header-sub" style="display:none">
    <button class="btn-back" onclick="backToKanban()">‹ Voltar</button>
    <div class="sub-header-title" id="sub-header-title">Subtarefas</div>
    <div class="header-btns">
      <button class="btn-add" onclick="openSubModal()">＋ Sub</button>
    </div>
  </header>

  <div class="views">
    <!-- ── Kanban ── -->
    <div class="view active" id="view-kanban">
      <div class="loading" id="loading-k"><div class="spinner"></div><span>Carregando...</span></div>
      <div class="kanban-wrap" id="kanban-wrap" style="display:none"></div>
    </div>

    <!-- ── Subtasks Kanban ── -->
    <div class="view" id="view-subtasks">
      <div id="subtasks-banner"></div>
      <div class="kanban-wrap" id="sub-kanban-wrap"></div>
    </div>

    <!-- ── Subtasks Kanban (all) ── -->
    <div class="view" id="view-allsubs">
      <div class="kanban-wrap" id="allsubs-kanban-wrap"></div>
    </div>

    <!-- ── Calendar ── -->
    <div class="view" id="view-calendar">
      <div class="cal-nav-row">
        <div class="cal-month-label" id="cal-label"></div>
        <button class="cal-arrow" onclick="shiftMonth(-1)">‹</button>
        <button class="cal-arrow" onclick="shiftMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <nav id="main-nav">
    <button class="nav-btn active" id="nav-kanban" onclick="switchView('kanban')"><span class="icon">⬛</span><span>Kanban</span></button>
    <button class="nav-btn" id="nav-allsubs" onclick="switchView('allsubs')"><span class="icon">⊞</span><span>Todas Subs</span></button>
    <button class="nav-btn" id="nav-calendar" onclick="switchView('calendar')"><span class="icon">📅</span><span>Calendário</span></button>
  </nav>
</div>

<!-- ── Task Modal ── -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Nova Tarefa</div>
    <div class="field"><label>Título</label><input type="text" id="f-title" placeholder="Nome da tarefa..."/></div>
    <div class="field"><label>Descrição</label><textarea id="f-desc" placeholder="Detalhes opcionais..."></textarea></div>
    <div class="row2">
      <div class="field"><label>Coluna</label><select id="f-col"><option>A Fazer</option><option>Em Andamento</option><option>Concluído</option></select></div>
      <div class="field"><label>Data Final</label><input type="date" id="f-date"/></div>
    </div>
    <div class="field"><label>Prioridade</label>
      <div class="priority-group">
        <button class="prio-opt" data-p="Alta" onclick="setPrio('Alta')">● Alta</button>
        <button class="prio-opt" data-p="Média" onclick="setPrio('Média')">● Média</button>
        <button class="prio-opt" data-p="Baixa" onclick="setPrio('Baixa')">● Baixa</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-del-task" id="btn-del-task" onclick="deleteEditing()" style="display:none">🗑</button>
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveTask()">Salvar</button>
    </div>
  </div>
</div>

<!-- ── Subtask Modal ── -->
<div class="overlay" id="sub-overlay" onclick="handleSubOverlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="sub-modal-title">Nova Subtarefa</div>
    <div class="field"><label>Título</label><input type="text" id="sf-title" placeholder="Nome da subtarefa..."/></div>
    <div class="field"><label>Coluna</label><select id="sf-col"><option>A Fazer</option><option>Em Andamento</option><option>Concluído</option></select></div>
    <div class="field"><label>Prioridade</label>
      <div class="priority-group">
        <button class="prio-opt sub-prio-opt" data-p="Alta" onclick="setSubPrio('Alta')">● Alta</button>
        <button class="prio-opt sub-prio-opt" data-p="Média" onclick="setSubPrio('Média')">● Média</button>
        <button class="prio-opt sub-prio-opt" data-p="Baixa" onclick="setSubPrio('Baixa')">● Baixa</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-del-task" id="btn-del-sub" onclick="deleteSubEditing()" style="display:none">🗑</button>
      <button class="btn-cancel" onclick="closeSubModal()">Cancelar</button>
      <button class="btn-save" onclick="saveSubtask()">Salvar</button>
    </div>
  </div>
</div>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-title">⚙️ Opções</div>
  <button class="drawer-btn" onclick="exportData()"><span class="di">📤</span> Exportar backup</button>
  <button class="drawer-btn" onclick="document.getElementById('import-input').click()"><span class="di">📥</span> Importar backup</button>
  <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)"/>
  <div class="drawer-sep"></div>
  <button class="drawer-btn" onclick="confirmClear()"><span class="di">🗑</span> Limpar tudo</button>
  <div class="drawer-sep"></div>
  <div class="drawer-note">💡 Use "Exportar backup" regularmente para salvar suas tarefas com segurança.</div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── IndexedDB ── */
const DB_NAME='flowboard',DB_VER=2,STORE='tasks';
let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains(STORE))e.target.result.createObjectStore(STORE,{keyPath:'id'})};r.onsuccess=e=>{db=e.target.result;res(db)};r.onerror=e=>rej(e.target.error)})}
function dbGetAll(){return new Promise((res,rej)=>{const r=db.transaction(STORE,'readonly').objectStore(STORE).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
function dbPut(t){return new Promise((res,rej)=>{const r=db.transaction(STORE,'readwrite').objectStore(STORE).put(t);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
function dbDelete(id){return new Promise((res,rej)=>{const r=db.transaction(STORE,'readwrite').objectStore(STORE).delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}
function dbClear(){return new Promise((res,rej)=>{const r=db.transaction(STORE,'readwrite').objectStore(STORE).clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})}

/* ── Constants ── */
const COLS=['A Fazer','Em Andamento','Concluído'];
const CC={'A Fazer':'#7C8CF8','Em Andamento':'#FFAB2E','Concluído':'#4ECDC4'};
const PR={'Alta':{color:'#FF5C5C',bg:'rgba(255,92,92,0.15)'},'Média':{color:'#FFAB2E',bg:'rgba(255,171,46,0.15)'},'Baixa':{color:'#4ECDC4',bg:'rgba(78,205,196,0.15)'}};
const MO=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const WD=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

let tasks=[],editId=null,selPrio='Média',currentView='kanban';
let calDate=new Date();calDate.setDate(1);
let activeTaskId=null,editSubId=null,selSubPrio='Média',_globalSubContext=false;

/* ── Init ── */
async function init(){
  await openDB();
  tasks=await dbGetAll();
  // migrate old tasks without subtasks
  let needSave=false;
  tasks.forEach(t=>{if(!t.subtasks){t.subtasks=[];needSave=true;}});
  if(needSave)for(const t of tasks)await dbPut(t);

  if(!tasks.length){
    const def=[
      {id:uid(),title:'Pesquisar referências',desc:'Coletar referências visuais e concorrentes.',column:'A Fazer',priority:'Média',dueDate:'',subtasks:[
        {id:uid(),title:'Analisar concorrentes',column:'Concluído',priority:'Baixa'},
        {id:uid(),title:'Montar moodboard',column:'Em Andamento',priority:'Média'},
        {id:uid(),title:'Documentar insights',column:'A Fazer',priority:'Baixa'},
      ]},
      {id:uid(),title:'Wireframes iniciais',desc:'Criar wireframes de baixa fidelidade.',column:'Em Andamento',priority:'Alta',dueDate:'',subtasks:[
        {id:uid(),title:'Fluxo de navegação',column:'Concluído',priority:'Alta'},
        {id:uid(),title:'Tela home',column:'Em Andamento',priority:'Alta'},
        {id:uid(),title:'Tela de detalhes',column:'A Fazer',priority:'Média'},
        {id:uid(),title:'Tela de perfil',column:'A Fazer',priority:'Baixa'},
      ]},
      {id:uid(),title:'Reunião de kick-off',desc:'Apresentar escopo do projeto para o time.',column:'Concluído',priority:'Baixa',dueDate:'',subtasks:[
        {id:uid(),title:'Preparar apresentação',column:'Concluído',priority:'Média'},
        {id:uid(),title:'Confirmar participantes',column:'Concluído',priority:'Alta'},
      ]},
    ];
    for(const t of def)await dbPut(t);
    tasks=def;
  }
  document.getElementById('loading-k').style.display='none';
  document.getElementById('kanban-wrap').style.display='flex';
  renderKanban();
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}

/* ── Views ── */
function switchView(v){
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  const nb=document.getElementById('nav-'+v);
  if(nb)nb.classList.add('active');
  currentView=v;
  if(v==='kanban')renderKanban();
  else if(v==='calendar')renderCalendar();
  else if(v==='subtasks')renderSubKanban();
  else if(v==='allsubs')renderAllSubsKanban();
}

/* ── Open subtask view for a task ── */
function openSubtasksView(taskId){
  activeTaskId=taskId;
  const t=tasks.find(x=>x.id===taskId);
  if(!t)return;
  // swap headers
  document.getElementById('header-main').style.display='none';
  document.getElementById('header-sub').style.display='flex';
  document.getElementById('sub-header-title').textContent=t.title;
  // hide main nav
  document.getElementById('main-nav').style.display='none';
  switchView('subtasks');
}

function backToKanban(){
  activeTaskId=null;
  document.getElementById('header-main').style.display='flex';
  document.getElementById('header-sub').style.display='none';
  document.getElementById('main-nav').style.display='flex';
  switchView('kanban');
}

/* ── Kanban (main) ── */
function renderKanban(){
  const wrap=document.getElementById('kanban-wrap');
  wrap.innerHTML='';
  COLS.forEach(col=>{
    const ct=tasks.filter(t=>t.column===col),others=COLS.filter(c=>c!==col);
    const el=document.createElement('div');el.className='col';
    el.innerHTML=`<div class="col-header"><div class="col-dot" style="background:${CC[col]}"></div><div class="col-title">${col}</div><div class="col-count">${ct.length}</div></div><div class="col-body">${ct.length?'':'<div class="col-empty">Nenhuma tarefa</div>'}</div>`;
    wrap.appendChild(el);
    ct.forEach(t=>el.querySelector('.col-body').appendChild(makeCard(t,others)));
  });
}

function makeCard(t,others){
  const p=PR[t.priority]||PR['Média'],c=CC[t.column]||'#7C8CF8',el=document.createElement('div');
  el.className='card';
  const mv=others.map(o=>`<button class="action-btn btn-move" onclick="event.stopPropagation();moveTask('${t.id}','${o}')">→ ${o.split(' ')[0]}</button>`).join('');
  const subs=t.subtasks||[];
  const done=subs.filter(s=>s.column==='Concluído').length;
  const total=subs.length;
  const pct=total?Math.round((done/total)*100):0;

  let progressHtml='';
  if(total>0){
    progressHtml=`<div class="subtask-progress">
      <div class="subtask-progress-label"><span>Subtarefas</span><span>${done}/${total}</span></div>
      <div class="subtask-progress-bar-bg"><div class="subtask-progress-bar" style="width:${pct}%"></div></div>
    </div>`;
  }

  el.innerHTML=`
    <div class="card-accent" style="background:${c}"></div>
    <div class="card-title">${esc(t.title)}</div>
    ${t.desc?`<div class="card-desc">${esc(t.desc)}</div>`:''}
    <div class="card-meta">
      <span class="badge" style="color:${p.color};background:${p.bg}">● ${t.priority}</span>
      ${t.dueDate?`<span class="date-chip">📅 ${fmt(t.dueDate)}</span>`:''}
      <span class="subtask-chip" onclick="event.stopPropagation();openSubtasksView('${t.id}')">⊞ ${total} subtarefa${total!==1?'s':''}</span>
    </div>
    ${progressHtml}
    <div class="card-actions" onclick="event.stopPropagation()">
      <button class="action-btn btn-subtasks" onclick="openSubtasksView('${t.id}')">⊞ Subs</button>
      <button class="action-btn btn-edit" onclick="openModal('${t.id}')">✏️ Editar</button>
      ${mv}
      <button class="action-btn btn-del" onclick="deleteTask('${t.id}')">🗑</button>
    </div>`;
  return el;
}

async function moveTask(id,col){const t=tasks.find(x=>x.id===id);if(!t)return;t.column=col;await dbPut(t);renderKanban();toast('Movido para '+col)}
async function deleteTask(id){tasks=tasks.filter(x=>x.id!==id);await dbDelete(id);renderKanban();toast('Tarefa removida')}

/* ── All Subtasks Kanban ── */
function renderAllSubsKanban(){
  const wrap=document.getElementById('allsubs-kanban-wrap');
  wrap.innerHTML='';
  // collect all subtasks with reference to parent
  const allSubs=[];
  tasks.forEach(t=>(t.subtasks||[]).forEach(s=>allSubs.push({...s,_parentId:t.id,_parentTitle:t.title,_parentCol:t.column})));

  COLS.forEach(col=>{
    const ct=allSubs.filter(s=>s.column===col);
    const others=COLS.filter(c=>c!==col);
    const el=document.createElement('div');el.className='col';
    el.innerHTML=`<div class="col-header"><div class="col-dot" style="background:${CC[col]}"></div><div class="col-title">${col}</div><div class="col-count">${ct.length}</div></div><div class="col-body">${ct.length?'':'<div class="col-empty">Nenhuma subtarefa</div>'}</div>`;
    wrap.appendChild(el);
    ct.forEach(s=>el.querySelector('.col-body').appendChild(makeGlobalSubCard(s,others)));
  });
}

function makeGlobalSubCard(s,others){
  const p=PR[s.priority]||PR['Média'],c=CC[s.column]||'#7C8CF8',el=document.createElement('div');
  el.className='sub-card';
  const mv=others.map(o=>`<button class="action-btn btn-move" onclick="moveSubtaskGlobal('${s._parentId}','${s.id}','${o}')">→ ${o.split(' ')[0]}</button>`).join('');
  el.innerHTML=`
    <div class="sub-card-accent" style="background:${c}"></div>
    <div class="sub-card-title">${esc(s.title)}</div>
    <div class="sub-card-meta" style="margin-bottom:5px">
      <span class="badge" style="color:${p.color};background:${p.bg}">● ${s.priority}</span>
    </div>
    <span class="parent-chip" onclick="openSubtasksView('${s._parentId}')" title="${esc(s._parentTitle)}">↳ ${esc(s._parentTitle)}</span>
    <div class="sub-card-actions">
      <button class="action-btn btn-edit" onclick="openGlobalSubModal('${s._parentId}','${s.id}')">✏️ Editar</button>
      ${mv}
      <button class="action-btn btn-del" onclick="deleteSubtaskGlobal('${s._parentId}','${s.id}')">🗑</button>
    </div>`;
  return el;
}

async function moveSubtaskGlobal(parentId,subId,col){
  const t=tasks.find(x=>x.id===parentId);if(!t)return;
  const s=t.subtasks.find(x=>x.id===subId);if(!s)return;
  s.column=col;await dbPut(t);renderAllSubsKanban();toast('Subtarefa movida para '+col);
}

async function deleteSubtaskGlobal(parentId,subId){
  const t=tasks.find(x=>x.id===parentId);if(!t)return;
  t.subtasks=t.subtasks.filter(x=>x.id!==subId);
  await dbPut(t);renderAllSubsKanban();toast('Subtarefa removida');
}

function openGlobalSubModal(parentId,subId){
  activeTaskId=parentId;
  // after saving/deleting we need to re-render allsubs, so flag it
  _globalSubContext=true;
  openSubModal(subId);
}

/* ── Subtask Kanban ── */
function renderSubKanban(){
  const t=tasks.find(x=>x.id===activeTaskId);
  if(!t)return;
  const subs=t.subtasks||[];

  // Banner
  const done=subs.filter(s=>s.column==='Concluído').length;
  const total=subs.length;
  document.getElementById('subtasks-banner').innerHTML=`
    <div class="subtasks-banner">
      <div class="subtasks-banner-icon">⊞</div>
      <div class="subtasks-banner-info">
        <div class="subtasks-banner-title">${esc(t.title)}</div>
        <div class="subtasks-banner-desc">${done} de ${total} subtarefa${total!==1?'s':''} concluída${done!==1?'s':''} · ${t.priority} prioridade</div>
      </div>
    </div>`;

  const wrap=document.getElementById('sub-kanban-wrap');
  wrap.innerHTML='';
  COLS.forEach(col=>{
    const ct=subs.filter(s=>s.column===col);
    const others=COLS.filter(c=>c!==col);
    const el=document.createElement('div');el.className='col';
    el.innerHTML=`<div class="col-header"><div class="col-dot" style="background:${CC[col]}"></div><div class="col-title">${col}</div><div class="col-count">${ct.length}</div></div><div class="col-body">${ct.length?'':'<div class="col-empty">Nenhuma subtarefa</div>'}</div>`;
    wrap.appendChild(el);
    ct.forEach(s=>el.querySelector('.col-body').appendChild(makeSubCard(s,others)));
  });
}

function makeSubCard(s,others){
  const p=PR[s.priority]||PR['Média'],c=CC[s.column]||'#7C8CF8',el=document.createElement('div');
  el.className='sub-card';
  const mv=others.map(o=>`<button class="action-btn btn-move" onclick="moveSubtask('${s.id}','${o}')">→ ${o.split(' ')[0]}</button>`).join('');
  el.innerHTML=`
    <div class="sub-card-accent" style="background:${c}"></div>
    <div class="sub-card-title">${esc(s.title)}</div>
    <div class="sub-card-meta"><span class="badge" style="color:${p.color};background:${p.bg}">● ${s.priority}</span></div>
    <div class="sub-card-actions">
      <button class="action-btn btn-edit" onclick="openSubModal('${s.id}')">✏️ Editar</button>
      ${mv}
      <button class="action-btn btn-del" onclick="deleteSubtask('${s.id}')">🗑</button>
    </div>`;
  return el;
}

async function moveSubtask(subId,col){
  const t=tasks.find(x=>x.id===activeTaskId);if(!t)return;
  const s=t.subtasks.find(x=>x.id===subId);if(!s)return;
  s.column=col;await dbPut(t);renderSubKanban();toast('Subtarefa movida para '+col);
}

async function deleteSubtask(subId){
  const t=tasks.find(x=>x.id===activeTaskId);if(!t)return;
  t.subtasks=t.subtasks.filter(x=>x.id!==subId);
  await dbPut(t);renderSubKanban();toast('Subtarefa removida');
}

/* ── Calendar ── */
function renderCalendar(){
  const yr=calDate.getFullYear(),mo=calDate.getMonth();
  document.getElementById('cal-label').textContent=MO[mo]+' '+yr;
  const grid=document.getElementById('cal-grid');
  grid.innerHTML=WD.map(d=>`<div class="cal-day-lbl">${d}</div>`).join('');
  const fd=new Date(yr,mo,1).getDay(),tot=new Date(yr,mo+1,0).getDate(),td=new Date();
  for(let i=0;i<fd;i++)grid.innerHTML+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=tot;d++){
    const str=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=td.getFullYear()===yr&&td.getMonth()===mo&&td.getDate()===d;
    const cell=document.createElement('div');cell.className='cal-cell'+(isT?' today':'');
    cell.innerHTML=`<div class="cal-num">${d}</div>`;
    tasks.filter(t=>t.dueDate===str).forEach(t=>{
      const p=PR[t.priority]||PR['Média'],chip=document.createElement('div');
      chip.className='cal-chip';chip.title=t.title;chip.style.cssText=`background:${p.bg};color:${p.color}`;
      chip.textContent=t.title;chip.onclick=()=>openModal(t.id);cell.appendChild(chip);
    });
    grid.appendChild(cell);
  }
}
function shiftMonth(dir){calDate.setMonth(calDate.getMonth()+dir);renderCalendar()}

/* ── Task Modal ── */
function openModal(id=null){
  editId=id;const t=id?tasks.find(x=>x.id===id):null;
  document.getElementById('modal-title').textContent=t?'Editar Tarefa':'Nova Tarefa';
  document.getElementById('f-title').value=t?t.title:'';
  document.getElementById('f-desc').value=t?t.desc:'';
  document.getElementById('f-col').value=t?t.column:'A Fazer';
  document.getElementById('f-date').value=t?t.dueDate:'';
  document.getElementById('btn-del-task').style.display=t?'block':'none';
  setPrio(t?t.priority:'Média');
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),350);
}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
function handleOverlayClick(e){if(e.target===document.getElementById('overlay'))closeModal()}
function setPrio(p){
  selPrio=p;
  document.querySelectorAll('.prio-opt:not(.sub-prio-opt)').forEach(btn=>{
    const pp=PR[btn.dataset.p]||PR['Média'],sel=btn.dataset.p===p;
    btn.style.cssText=sel?`background:${pp.bg};border-color:${pp.color};color:${pp.color}`:'';
  });
}
async function saveTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return}
  const data={title,desc:document.getElementById('f-desc').value.trim(),column:document.getElementById('f-col').value,dueDate:document.getElementById('f-date').value,priority:selPrio};
  if(editId){const t=tasks.find(x=>x.id===editId);Object.assign(t,data);await dbPut(t);toast('Tarefa atualizada ✓')}
  else{const t={id:uid(),...data,subtasks:[]};tasks.push(t);await dbPut(t);toast('Tarefa criada ✓')}
  closeModal();
  currentView==='kanban'?renderKanban():renderCalendar();
}
async function deleteEditing(){
  if(!editId)return;tasks=tasks.filter(x=>x.id!==editId);await dbDelete(editId);
  closeModal();currentView==='kanban'?renderKanban():renderCalendar();toast('Tarefa removida');
}

/* ── Subtask Modal ── */
function openSubModal(subId=null){
  editSubId=subId;
  const t=tasks.find(x=>x.id===activeTaskId);
  const s=subId?(t?.subtasks||[]).find(x=>x.id===subId):null;
  document.getElementById('sub-modal-title').textContent=s?'Editar Subtarefa':'Nova Subtarefa';
  document.getElementById('sf-title').value=s?s.title:'';
  document.getElementById('sf-col').value=s?s.column:'A Fazer';
  document.getElementById('btn-del-sub').style.display=s?'block':'none';
  setSubPrio(s?s.priority:'Média');
  document.getElementById('sub-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('sf-title').focus(),350);
}
function closeSubModal(){document.getElementById('sub-overlay').classList.remove('open')}
function handleSubOverlayClick(e){if(e.target===document.getElementById('sub-overlay'))closeSubModal()}
function setSubPrio(p){
  selSubPrio=p;
  document.querySelectorAll('.sub-prio-opt').forEach(btn=>{
    const pp=PR[btn.dataset.p]||PR['Média'],sel=btn.dataset.p===p;
    btn.style.cssText=sel?`background:${pp.bg};border-color:${pp.color};color:${pp.color}`:'';
  });
}
async function saveSubtask(){
  const title=document.getElementById('sf-title').value.trim();
  if(!title){document.getElementById('sf-title').focus();return}
  const t=tasks.find(x=>x.id===activeTaskId);if(!t)return;
  if(!t.subtasks)t.subtasks=[];
  const data={title,column:document.getElementById('sf-col').value,priority:selSubPrio};
  if(editSubId){const s=t.subtasks.find(x=>x.id===editSubId);Object.assign(s,data);toast('Subtarefa atualizada ✓')}
  else{t.subtasks.push({id:uid(),...data});toast('Subtarefa criada ✓')}
  await dbPut(t);
  closeSubModal();
  if(_globalSubContext){_globalSubContext=false;renderAllSubsKanban();}
  else renderSubKanban();
}
async function deleteSubEditing(){
  if(!editSubId)return;
  const t=tasks.find(x=>x.id===activeTaskId);if(!t)return;
  t.subtasks=t.subtasks.filter(x=>x.id!==editSubId);
  await dbPut(t);closeSubModal();
  if(_globalSubContext){_globalSubContext=false;renderAllSubsKanban();}
  else renderSubKanban();
  toast('Subtarefa removida');
}

/* ── Drawer ── */
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('open')}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open')}

/* ── Export / Import ── */
function exportData(){
  const b=new Blob([JSON.stringify(tasks,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`flowboard-${new Date().toISOString().slice(0,10)}.json`;a.click();
  closeDrawer();toast('Backup exportado ✓');
}
async function importData(e){
  const file=e.target.files[0];if(!file)return;
  try{
    const parsed=JSON.parse(await file.text());
    if(!Array.isArray(parsed))throw new Error();
    await dbClear();tasks=[];
    for(const t of parsed){if(!t.subtasks)t.subtasks=[];await dbPut(t);tasks.push(t)}
    closeDrawer();currentView==='kanban'?renderKanban():renderCalendar();
    toast(`${tasks.length} tarefas importadas ✓`);
  }catch{toast('Erro ao importar arquivo')}
  e.target.value='';
}
async function confirmClear(){
  if(!confirm('Apagar TODAS as tarefas?'))return;
  await dbClear();tasks=[];closeDrawer();renderKanban();toast('Dados apagados');
}

/* ── Utils ── */
function fmt(s){if(!s)return'';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
let tt;function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2400)}

init();
</script>
