<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Flowboard</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Tasks</a></li>
                <li><a href="#">Subtasks</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="tasks">
            <h2>Tasks</h2>
            <div class="kanban-view" id="main-kanban">
                <!-- Main Kanban View -->
            </div>
        </section>
        <section id="subtasks">
            <h2>Subtasks</h2>
            <div class="kanban-view" id="subtasks-kanban">
                <!-- Subtasks Kanban View -->
                <h3>Subtasks</h3>
                <div class="subtask">
                    <input type="checkbox">
                    <label>Subtask 1</label>
                </div>
                <div class="subtask">
                    <input type="checkbox">
                    <label>Subtask 2</label>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
