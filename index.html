<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0D0F1A"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="flow.board"/>
<title>flow.board</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap"/>

<script>
/* ── PWA Service Worker (inline) ── */
if ('serviceWorker' in navigator) {
  const sw = `
    const CACHE = 'flowboard-v1';
    const ASSETS = [location.href];
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))));
    self.addEventListener('fetch',   e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
  `;
  const blob = new Blob([sw], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}
</script>

<style>
:root {
  --bg:       #0D0F1A;
  --surface:  #13152A;
  --border:   rgba(255,255,255,0.08);
  --text:     #E8E8F0;
  --muted:    #9999BB;
  --accent:   #7C8CF8;
  --green:    #4ECDC4;
  --yellow:   #FFAB2E;
  --red:      #FF5C5C;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT ── */
.app   { display: flex; flex-direction: column; height: 100dvh; }
.views { flex: 1; overflow: hidden; position: relative; }
.view  { position: absolute; inset: 0; overflow-y: auto; padding: 20px 16px 24px; display: none; }
.view.active { display: block; }

/* ── HEADER ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  background: rgba(13,15,26,0.9);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  flex-shrink: 0; z-index: 50;
}
.logo {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px;
  background: linear-gradient(135deg, var(--accent), var(--green));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo em { -webkit-text-fill-color: var(--yellow); font-style: normal; }

.btn-add {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 10px; border: none; cursor: pointer;
  background: linear-gradient(135deg, var(--accent), #5B6EF5);
  color: #fff; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
  box-shadow: 0 4px 14px rgba(124,140,248,0.4);
  -webkit-tap-highlight-color: transparent;
}

/* ── BOTTOM NAV ── */
nav {
  display: flex; border-top: 1px solid var(--border);
  background: rgba(13,15,26,0.95);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  flex-shrink: 0;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 10px 0; border: none; background: transparent;
  color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 11px;
  cursor: pointer; transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn .icon { font-size: 20px; line-height: 1; }
.nav-btn.active { color: var(--accent); }

/* ── KANBAN ── */
.kanban-wrap { display: flex; gap: 14px; min-width: max-content; padding-bottom: 4px; }
#view-kanban { overflow-x: auto; }

.col {
  width: 260px; flex-shrink: 0;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 18px; display: flex; flex-direction: column; overflow: hidden;
}
.col-header {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 16px 10px;
}
.col-dot   { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.col-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
.col-count { margin-left: auto; font-size: 12px; color: var(--muted); background: rgba(255,255,255,0.07); padding: 1px 9px; border-radius: 20px; }
.col-body  { padding: 0 10px 14px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.col-empty { text-align: center; padding: 20px; color: #555577; font-size: 12px; }

/* ── CARD ── */
.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 13px; padding: 12px 13px;
  position: relative; overflow: hidden; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.card:active { transform: scale(0.98); }
.card-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; }
.card-title  { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; margin-bottom: 5px; line-height: 1.4; }
.card-desc   { font-size: 11px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
.card-meta   { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.badge       { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; display: inline-flex; align-items: center; gap: 3px; }
.date-chip   { font-size: 10px; color: var(--muted); margin-left: auto; }
.card-actions { display: flex; gap: 5px; margin-top: 9px; padding-top: 9px; border-top: 1px solid rgba(255,255,255,0.06); }
.action-btn  {
  flex: 1; padding: 5px 4px; border-radius: 7px; border: none; cursor: pointer;
  font-size: 10px; font-weight: 500; font-family: 'DM Sans', sans-serif;
  transition: all 0.15s; -webkit-tap-highlight-color: transparent;
}
.btn-move { background: rgba(255,255,255,0.05); color: var(--muted); }
.btn-edit { background: rgba(78,205,196,0.1); color: var(--green); }
.btn-del  { background: rgba(255,92,92,0.1); color: var(--red); }

/* ── CALENDAR ── */
.cal-nav-row {
  display: flex; align-items: center; gap: 12px; margin-bottom: 18px;
}
.cal-month-label {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; flex: 1;
}
.cal-arrow {
  width: 34px; height: 34px; border-radius: 10px;
  border: 1px solid var(--border); background: rgba(255,255,255,0.04);
  color: var(--text); font-size: 16px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}

.cal-grid     { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
.cal-day-lbl  { text-align: center; font-size: 11px; font-weight: 600; color: #5555AA; padding-bottom: 6px; font-family: 'Syne', sans-serif; }
.cal-cell     { min-height: 70px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 5px; display: flex; flex-direction: column; gap: 3px; }
.cal-cell.today { border-color: var(--accent); background: rgba(124,140,248,0.07); }
.cal-cell.empty { background: transparent; border-color: transparent; }
.cal-num      { font-size: 12px; font-weight: 600; font-family: 'Syne', sans-serif; }
.cal-cell.today .cal-num { color: var(--accent); }
.cal-chip     { font-size: 9px; font-weight: 600; padding: 2px 5px; border-radius: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; line-height: 1.4; }

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  z-index: 999; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border-top: 1px solid rgba(255,255,255,0.12);
  border-radius: 24px 24px 0 0; padding: 24px 20px 32px;
  width: 100%; max-height: 90dvh; overflow-y: auto;
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(.32,.72,0,1);
}
.overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 38px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 4px; margin: 0 auto 20px; }
.modal-title  { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; margin-bottom: 20px; }

.field       { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.5px; text-transform: uppercase; }
.field input,
.field textarea,
.field select {
  width: 100%; padding: 11px 13px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
  transition: border-color 0.15s; appearance: none; -webkit-appearance: none;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 68px; }
.field select option { background: #13152A; }
.field input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.priority-group { display: flex; gap: 7px; }
.prio-opt {
  flex: 1; padding: 8px 4px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent; cursor: pointer; text-align: center;
  font-size: 11px; font-weight: 600; font-family: 'DM Sans', sans-serif;
  color: var(--muted); transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.modal-footer { display: flex; gap: 8px; margin-top: 20px; }
.btn-cancel {
  flex: 1; padding: 13px; border-radius: 11px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
}
.btn-save {
  flex: 2; padding: 13px; border-radius: 11px; border: none;
  background: linear-gradient(135deg, var(--accent), #5B6EF5);
  color: #fff; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700;
  box-shadow: 0 4px 16px rgba(124,140,248,0.35);
}
.btn-del-task {
  padding: 13px 16px; border-radius: 11px; border: none;
  background: rgba(255,92,92,0.12); color: var(--red); cursor: pointer;
  font-size: 16px;
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(30,33,55,0.95); border: 1px solid var(--border);
  padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 500;
  opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 9999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">flow<em>.</em>board</div>
    <button class="btn-add" onclick="openModal()">＋ Nova Tarefa</button>
  </header>

  <div class="views">
    <!-- KANBAN -->
    <div class="view active" id="view-kanban">
      <div class="kanban-wrap" id="kanban-wrap"></div>
    </div>
    <!-- CALENDAR -->
    <div class="view" id="view-calendar">
      <div class="cal-nav-row">
        <div class="cal-month-label" id="cal-label"></div>
        <button class="cal-arrow" onclick="shiftMonth(-1)">‹</button>
        <button class="cal-arrow" onclick="shiftMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <nav>
    <button class="nav-btn active" id="nav-kanban" onclick="switchView('kanban')">
      <span class="icon">⬛</span><span>Kanban</span>
    </button>
    <button class="nav-btn" id="nav-calendar" onclick="switchView('calendar')">
      <span class="icon">📅</span><span>Calendário</span>
    </button>
  </nav>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Nova Tarefa</div>

    <div class="field">
      <label>Título</label>
      <input type="text" id="f-title" placeholder="Nome da tarefa..."/>
    </div>
    <div class="field">
      <label>Descrição</label>
      <textarea id="f-desc" placeholder="Detalhes opcionais..."></textarea>
    </div>
    <div class="row2">
      <div class="field">
        <label>Coluna</label>
        <select id="f-col">
          <option>A Fazer</option>
          <option>Em Andamento</option>
          <option>Concluído</option>
        </select>
      </div>
      <div class="field">
        <label>Data Final</label>
        <input type="date" id="f-date"/>
      </div>
    </div>
    <div class="field">
      <label>Prioridade</label>
      <div class="priority-group" id="prio-group">
        <button class="prio-opt" data-p="Alta"  onclick="setPrio('Alta')">● Alta</button>
        <button class="prio-opt" data-p="Média" onclick="setPrio('Média')">● Média</button>
        <button class="prio-opt" data-p="Baixa" onclick="setPrio('Baixa')">● Baixa</button>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-del-task" id="btn-del-task" onclick="deleteEditing()" style="display:none">🗑</button>
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveTask()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════════
   STATE & STORAGE
════════════════════════════════════════════ */
const STORAGE_KEY = 'flowboard_tasks';

const COLS = ['A Fazer','Em Andamento','Concluído'];
const COL_COLOR = { 'A Fazer':'#7C8CF8', 'Em Andamento':'#FFAB2E', 'Concluído':'#4ECDC4' };
const PRIO = {
  'Alta':  { color:'#FF5C5C', bg:'rgba(255,92,92,0.15)'  },
  'Média': { color:'#FFAB2E', bg:'rgba(255,171,46,0.15)' },
  'Baixa': { color:'#4ECDC4', bg:'rgba(78,205,196,0.15)' },
};
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

let tasks = [];
let editId = null;
let selPrio = 'Média';
let calDate = new Date();
calDate.setDate(1);

function load() {
  try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { tasks = []; }
  if (!tasks.length) {
    tasks = [
      { id: uid(), title:'Pesquisar referências', desc:'Coletar referências visuais.', column:'A Fazer',     priority:'Média', dueDate:'' },
      { id: uid(), title:'Wireframes iniciais',   desc:'Criar wireframes de baixa fidelidade.', column:'Em Andamento', priority:'Alta',  dueDate:'' },
      { id: uid(), title:'Reunião de kick-off',   desc:'Apresentar escopo do projeto.', column:'Concluído',   priority:'Baixa', dueDate:'' },
    ];
    save();
  }
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }
function uid()  { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

/* ════════════════════════════════════════════
   VIEW SWITCH
════════════════════════════════════════════ */
let currentView = 'kanban';

function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('nav-'+v).classList.add('active');
  currentView = v;
  if (v === 'kanban')   renderKanban();
  if (v === 'calendar') renderCalendar();
}

/* ════════════════════════════════════════════
   KANBAN
════════════════════════════════════════════ */
function renderKanban() {
  const wrap = document.getElementById('kanban-wrap');
  wrap.innerHTML = '';
  COLS.forEach(col => {
    const colTasks = tasks.filter(t => t.column === col);
    const others   = COLS.filter(c => c !== col);
    const colEl = document.createElement('div');
    colEl.className = 'col';
    colEl.innerHTML = `
      <div class="col-header">
        <div class="col-dot" style="background:${COL_COLOR[col]}"></div>
        <div class="col-title">${col}</div>
        <div class="col-count">${colTasks.length}</div>
      </div>
      <div class="col-body" id="col-${encodeURIComponent(col)}">
        ${colTasks.length === 0 ? '<div class="col-empty">Nenhuma tarefa</div>' : ''}
      </div>`;
    wrap.appendChild(colEl);
    const body = colEl.querySelector('.col-body');
    colTasks.forEach(t => body.appendChild(makeCard(t, others)));
  });
}

function makeCard(t, others) {
  const p = PRIO[t.priority] || PRIO['Média'];
  const c = COL_COLOR[t.column] || '#7C8CF8';
  const el = document.createElement('div');
  el.className = 'card';
  const moveBtns = others.map(o =>
    `<button class="action-btn btn-move" onclick="event.stopPropagation();moveTask('${t.id}','${o}')">→ ${o.split(' ')[0]}</button>`
  ).join('');
  el.innerHTML = `
    <div class="card-accent" style="background:${c}"></div>
    <div class="card-title">${escHtml(t.title)}</div>
    ${t.desc ? `<div class="card-desc">${escHtml(t.desc)}</div>` : ''}
    <div class="card-meta">
      <span class="badge" style="color:${p.color};background:${p.bg}">● ${t.priority}</span>
      ${t.dueDate ? `<span class="date-chip">📅 ${formatDate(t.dueDate)}</span>` : ''}
    </div>
    <div class="card-actions" onclick="event.stopPropagation()">
      <button class="action-btn btn-edit" onclick="openModal('${t.id}')">✏️ Editar</button>
      ${moveBtns}
      <button class="action-btn btn-del" onclick="deleteTask('${t.id}')">🗑</button>
    </div>`;
  return el;
}

function moveTask(id, col) {
  const t = tasks.find(x => x.id === id);
  if (t) { t.column = col; save(); renderKanban(); toast('Movido para ' + col); }
}

function deleteTask(id) {
  tasks = tasks.filter(x => x.id !== id);
  save(); renderKanban(); toast('Tarefa removida');
}

/* ════════════════════════════════════════════
   CALENDAR
════════════════════════════════════════════ */
function renderCalendar() {
  const yr = calDate.getFullYear(), mo = calDate.getMonth();
  document.getElementById('cal-label').textContent = MONTHS[mo] + ' ' + yr;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = DAYS.map(d => `<div class="cal-day-lbl">${d}</div>`).join('');
  const firstDay = new Date(yr, mo, 1).getDay();
  const total    = new Date(yr, mo+1, 0).getDate();
  const today    = new Date();
  for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div class="cal-cell empty"></div>`;
  for (let d = 1; d <= total; d++) {
    const str  = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT  = today.getFullYear()===yr && today.getMonth()===mo && today.getDate()===d;
    const day  = document.createElement('div');
    day.className = 'cal-cell' + (isT ? ' today' : '');
    day.innerHTML = `<div class="cal-num">${d}</div>`;
    tasks.filter(t => t.dueDate === str).forEach(t => {
      const p = PRIO[t.priority] || PRIO['Média'];
      const chip = document.createElement('div');
      chip.className = 'cal-chip';
      chip.title = t.title;
      chip.style.cssText = `background:${p.bg};color:${p.color}`;
      chip.textContent = t.title;
      chip.onclick = () => openModal(t.id);
      day.appendChild(chip);
    });
    grid.appendChild(day);
  }
}

function shiftMonth(dir) {
  calDate.setMonth(calDate.getMonth() + dir);
  renderCalendar();
}

/* ════════════════════════════════════════════
   MODAL
════════════════════════════════════════════ */
function openModal(id = null) {
  editId = id;
  const t = id ? tasks.find(x => x.id === id) : null;
  document.getElementById('modal-title').textContent  = t ? 'Editar Tarefa' : 'Nova Tarefa';
  document.getElementById('f-title').value  = t ? t.title   : '';
  document.getElementById('f-desc').value   = t ? t.desc    : '';
  document.getElementById('f-col').value    = t ? t.column  : 'A Fazer';
  document.getElementById('f-date').value   = t ? t.dueDate : '';
  document.getElementById('btn-del-task').style.display = t ? 'block' : 'none';
  setPrio(t ? t.priority : 'Média');
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 350);
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function handleOverlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function setPrio(p) {
  selPrio = p;
  document.querySelectorAll('.prio-opt').forEach(btn => {
    const pp = PRIO[btn.dataset.p] || PRIO['Média'];
    const sel = btn.dataset.p === p;
    btn.style.cssText = sel
      ? `background:${pp.bg};border-color:${pp.color};color:${pp.color}`
      : '';
    btn.style.color = sel ? pp.color : '';
  });
}

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  if (editId) {
    const t = tasks.find(x => x.id === editId);
    Object.assign(t, {
      title, desc: document.getElementById('f-desc').value.trim(),
      column: document.getElementById('f-col').value,
      dueDate: document.getElementById('f-date').value,
      priority: selPrio,
    });
    toast('Tarefa atualizada ✓');
  } else {
    tasks.push({
      id: uid(), title,
      desc:     document.getElementById('f-desc').value.trim(),
      column:   document.getElementById('f-col').value,
      dueDate:  document.getElementById('f-date').value,
      priority: selPrio,
    });
    toast('Tarefa criada ✓');
  }
  save(); closeModal();
  if (currentView === 'kanban')   renderKanban();
  if (currentView === 'calendar') renderCalendar();
}

function deleteEditing() {
  if (!editId) return;
  tasks = tasks.filter(x => x.id !== editId);
  save(); closeModal();
  if (currentView === 'kanban')   renderKanban();
  if (currentView === 'calendar') renderCalendar();
  toast('Tarefa removida');
}

/* ════════════════════════════════════════════
   UTILS
════════════════════════════════════════════ */
function formatDate(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  return `${d}/${m}/${y}`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
load();
renderKanban();
</script>
